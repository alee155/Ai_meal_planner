name: Flutter CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_release:
    name: Build & Release (Android)
    runs-on: ubuntu-latest   # ✅ faster & cheaper than macOS

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Java for Android
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3️⃣ Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      # 4️⃣ Install dependencies
      - name: Install Flutter packages
        run: flutter pub get

      # 5️⃣ Analyze code quality
      - name: Analyze
        run: flutter analyze || true

      # 6️⃣ Run tests
      - name: Run tests
        run: flutter test

      # 7️⃣ Build Android APK (single file)
      - name: Build Android APK
        run: flutter build apk --release

      # 8️⃣ Upload APK to GitHub Release
      - name: Push to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/app/outputs/flutter-apk/app-release.apk
          tag: v1.0.${{ github.run_number }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}